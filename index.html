<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow Beauty</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #fff;
  color: #333;
}

/* Navbar */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: #ff4f81;
  color: white;
}

nav a {
  margin-left: 20px;
  color: white;
  text-decoration: none;
}

/* Hero */
.hero {
  height: 80vh;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.hero h1 {
  font-size: 45px;
}

.hero button {
  margin-top: 15px;
  padding: 12px 25px;
  border: none;
  background: #ff4f81;
  color: white;
  border-radius: 25px;
  cursor: pointer;
}

/* Products */
.section {
  padding: 50px 20px;
  text-align: center;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.product {
  border: 1px solid #eee;
  padding: 15px;
  border-radius: 10px;
  transition: 0.3s;
}

.product:hover {
  transform: translateY(-5px);
}

.product img {
  width: 100%;
  border-radius: 10px;
}

.product h3 {
  margin: 10px 0;
}

.product button {
  background: #ff4f81;
  color: white;
  border: none;
  padding: 8px 15px;
  border-radius: 20px;
  cursor: pointer;
}

/* Footer */
footer {
  background: #222;
  color: white;
  text-align: center;
  padding: 15px;
  margin-top: 30px;
}

/* Responsive */
@media(max-width: 768px) {
  header {
    flex-direction: column;
    text-align: center;
  }

  nav {
    margin-top: 10px;
  }
}
</style>
</head>

<body>

<header>
  <h2>Glow Beauty</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#products">Products</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Enhance Your Natural Beauty</h1>
  <p>Premium skincare & makeup products</p>
  <button onclick="shopNow()">Shop Now</button>
</section>

<section id="products" class="section">
  <h2>Our Products</h2>

  <div class="products">

    <div class="product">
      <img src="https://via.placeholder.com/250" alt="">
      <h3>Face Serum</h3>
      <p>₹499</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/250" alt="">
      <h3>Lipstick</h3>
      <p>₹299</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/250" alt="">
      <h3>Moisturizer</h3>
      <p>₹399</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/250" alt="">
      <h3>Foundation</h3>
      <p>₹599</p>
      <button>Add to Cart</button>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 Glow Beauty</p>
</footer>

<script>
function shopNow() {
  document.getElementById("products").scrollIntoView();
}
</script>

</body>
</html>
